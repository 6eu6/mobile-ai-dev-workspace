name: Deploy Oracle Worker

on:
  push:
    branches: [main]
    paths:
      - 'external-worker/**'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual update'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and update Oracle Worker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            cd /opt/palmkit-worker
            git fetch origin
            git checkout main 2>/dev/null || git checkout -b main origin/main
            git reset --hard origin/main
            cd /opt/palmkit-worker/external-worker
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            bun install --frozen-lockfile
            sudo systemctl restart palmkit-worker
            echo "Worker updated and restarted ✅"
            sudo systemctl status palmkit-worker --no-pager -l | tail -5
